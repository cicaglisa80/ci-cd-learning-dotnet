name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
          
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Publish app
        run: dotnet publish Api/Api.csproj --no-build --configuration Release --output ./publish

      - name: Upload published app artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish
    
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test --configuration Release --verbosity normal
    
  inspect-artifact:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download published app artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./downloaded-artifact

      - name: List downloaded files
        run: ls -la ./downloaded-artifact