name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build:
    uses: ./.github/workflows/dotnet-ci-reusable.yml
    with:
      dotnet-version: '8.0.x'
      solution-path: '_learning.sln'
      run-tests: true
      
    docker-build:
      runs-on: ubuntu-latest
      needs: ci-build

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: |
            docker build -t my-api:${{ github.sha }} .

        - name: Tag as latest (optional)
          run: |
            docker tag my-api:${{ github.sha }} my-api:latest