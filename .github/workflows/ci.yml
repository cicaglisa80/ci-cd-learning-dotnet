name: CI

on:
  pull_request:
    paths:
      - 'Api/**'
      - 'Api.Tests/**'
      - '.github/workflows/**'
      - '_learning.sln'
      - 'Dockerfile'
  push:
    branches: [ "main" ]
    paths:
      - 'Api/**'
      - 'Api.Tests/**'
      - '.github/workflows/**'
      - '_learning.sln'
      - 'Dockerfile'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build:
    uses: ./.github/workflows/dotnet-ci-reusable.yml
    with:
      dotnet-version: '8.0.x'
      solution-path: '_learning.sln'
      run-tests: true
      
  docker-build:
    runs-on: ubuntu-latest
    needs: ci-build
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: eu-west-2
      ECR_REPOSITORY: my-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t my-api:${{ github.sha }} .

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag my-api:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag my-api:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
    
      - name: Push image to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest