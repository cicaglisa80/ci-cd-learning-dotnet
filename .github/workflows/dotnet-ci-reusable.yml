name: Reusable .NET CI

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: true
        type: string
      solution-path:
        required: true
        type: string
      run-tests:
        required: false
        type: boolean
        default: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore
        run: dotnet restore ${{ inputs.solution-path }}

      - name: Build
        run: dotnet build ${{ inputs.solution-path }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ inputs.solution-path }} --no-build --configuration Release --verbosity normal